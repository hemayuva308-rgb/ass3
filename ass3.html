<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Practice Page</title>
    <style>
        body {
            font-family: serif;
            margin: 40px;
            line-height: 1.6;
        }
        h3 {
            text-transform: uppercase;
            font-weight: normal;
            margin-top: 30px;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }
        form {
            margin-top: 10px;
        }
        .form-group {
            margin-bottom: 8px;
        }
        label {
            display: inline-block;
            width: 90px;
        }
        input {
            padding: 2px;
            width: 200px;
        }
        button {
            margin-top: 8px;
            padding: 2px 10px;
            cursor: pointer;
        }
        ul {
            list-style-type: none;
            padding-left: 0;
        }
        li {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h3>Added Image via Local Storage</h3>
    <img src="OIP.jpg" alt="Red Apple" width="50" loading="lazy">

    <h3>Added Image via CDN</h3>
    <img src="https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=100" alt="Red Apple via CDN" width="50" loading="lazy">

    <h3>Added Video via CDN</h3>
    <video width="320" height="240" controls poster="https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=320">
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <h3>Create a Basic Form</h3>
    <form action="#">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" placeholder="ENTER USERNAME" required>
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" placeholder="ENTER PASSWORD" required>
        </div>
        <button type="submit">Submit</button>
    </form>

    <h3>HTML Entries</h3>
    <ul>
        <li>- copyright: &copy;</li>
        <li>- trademark: &amp;</li>
        <li>- ampersand: &cent;</li>
        
       
    </ul>

</body>
</html>
